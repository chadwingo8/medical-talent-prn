<title>Medical Talent PRN — Login</title>

<script src="config.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .login-card { background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); padding: 40px 36px; width: 100%; max-width: 420px; }
  .brand { text-align: center; margin-bottom: 32px; }
  .brand img { height: 72px; width: 72px; object-fit: contain; margin-bottom: 12px; }
  .brand h1 { font-size: 22px; font-weight: 700; color: #0f172a; }
  .brand h1 span { color: #dc2626; }
  .brand p { font-size: 13px; color: #64748b; margin-top: 4px; }
  .tabs { display: flex; border-bottom: 1px solid #e2e8f0; margin-bottom: 24px; }
  .tab-btn { flex: 1; padding: 10px; background: none; border: none; font-size: 14px; font-weight: 500; cursor: pointer; color: #64748b; border-bottom: 3px solid transparent; font-family: inherit; transition: all .15s; }
  .tab-btn.active { color: #1d4ed8; border-bottom-color: #1d4ed8; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-weight: 500; color: #64748b; margin-bottom: 5px; }
  .form-group input { width: 100%; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; font-family: inherit; color: #0f172a; transition: border .15s; }
  .form-group input:focus { outline: none; border-color: #1d4ed8; box-shadow: 0 0 0 3px rgba(29,78,216,.1); }
  .btn-submit { width: 100%; padding: 11px; background: #1d4ed8; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .15s; }
  .btn-submit:hover { background: #1e3a8a; }
  .btn-submit:disabled { background: #93c5fd; cursor: not-allowed; }
  .msg { margin-top: 14px; font-size: 13px; text-align: center; min-height: 18px; }
  .msg.error { color: #dc2626; }
  .msg.success { color: #16a34a; }
  .divider { border: none; border-top: 1px solid #e2e8f0; margin: 20px 0; }
</style>

    <h1>Medical Talent <span>PRN</span></h1>
    <p>Expense &amp; Income Tracker</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('login')"  id="tab-login">Sign In</button>
    <button class="tab-btn"        onclick="showTab('signup')" id="tab-signup">Create Account</button>
  </div>

  <!-- Login Form -->
  <div id="form-login">
    <div class="form-group"><label>Email</label><input type="email" id="l-email" placeholder="you@example.com" /></div>
    <div class="form-group"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••" /></div>
    <button class="btn-submit" onclick="login()">Sign In</button>
    <div class="msg" id="l-msg"></div>
  </div>

  <!-- Signup Form -->
  <div id="form-signup" style="display:none;">
    <div class="form-group"><label>Email</label><input type="email" id="s-email" placeholder="you@example.com" /></div>
    <div class="form-group"><label>Password</label><input type="password" id="s-pass" placeholder="Min 6 characters" /></div>
    <div class="form-group"><label>Confirm Password</label><input type="password" id="s-pass2" placeholder="Repeat password" /></div>
    <button class="btn-submit" onclick="signup()">Create Account</button>
    <div class="msg" id="s-msg"></div>
  </div>
</div>

<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// If already logged in, go straight to app
db.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'app.html';
});

function showTab(t) {
  document.getElementById('form-login').style.display  = t==='login'  ? 'block' : 'none';
  document.getElementById('form-signup').style.display = t==='signup' ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('active',  t==='login');
  document.getElementById('tab-signup').classList.toggle('active', t==='signup');
}

async function login() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  const msg   = document.getElementById('l-msg');
  if (!email || !pass) { msg.className='msg error'; msg.textContent='Please fill in all fields.'; return; }
  msg.className='msg'; msg.textContent='Signing in…';
  const { error } = await db.auth.signInWithPassword({ email, password: pass });
  if (error) { msg.className='msg error'; msg.textContent=error.message; }
  else window.location.href = 'app.html';
}

async function signup() {
  const email = document.getElementById('s-email').value.trim();
  const pass  = document.getElementById('s-pass').value;
  const pass2 = document.getElementById('s-pass2').value;
  const msg   = document.getElementById('s-msg');
  if (!email || !pass) { msg.className='msg error'; msg.textContent='Please fill in all fields.'; return; }
  if (pass !== pass2)  { msg.className='msg error'; msg.textContent='Passwords do not match.'; return; }
  if (pass.length < 6) { msg.className='msg error'; msg.textContent='Password must be at least 6 characters.'; return; }
  msg.className='msg'; msg.textContent='Creating account…';
  const { error } = await db.auth.signUp({ email, password: pass });
  if (error) { msg.className='msg error'; msg.textContent=error.message; }
  else { msg.className='msg success'; msg.textContent='Account created! Signing you in…'; setTimeout(()=>window.location.href='app.html',1200); }
}

// Allow Enter key
document.addEventListener('keydown', e => {
  if (e.key==='Enter') {
    if (document.getElementById('form-login').style.display!=='none') login();
    else signup();
  }
});
</script>
